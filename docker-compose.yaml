services:
  node-app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: node-app
    restart: unless-stopped
    volumes:
      - uploads-data:/app/uploads
    ports:
      - '${PORT}:${PORT}'
    environment:
      # Puerto de la app
      - PORT=${PORT}

      # JWT
      - JWT_SECRET=${JWT_SECRET}
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET}

      # Base de datos
      - DB_HOST=db
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_DIALECT=${DB_DIALECT}
      - TZ=${TZ:-America/Caracas}

      # CORS
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}

      # Email
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - EMAIL_FROM=${EMAIL_FROM}

      # Seed data
      - SEED_ADMIN_NAME=${SEED_ADMIN_NAME}
      - SEED_ADMIN_EMAIL=${SEED_ADMIN_EMAIL}
      - SEED_ADMIN_PASSWORD_HASH=${SEED_ADMIN_PASSWORD_HASH}
      - SEED_ADMIN_CI=${SEED_ADMIN_CI}

      # Correos de notificación
      - BomberosMail=${BomberosMail}
      - SeguridadMail=${SeguridadMail}
      - mantenimientoMail=${mantenimientoMail}
      - JefeDeProtocoloMail=${JefeDeProtocoloMail}
      - COPREDMail=${COPREDMail}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  db:
    image: postgres:18
    container_name: postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      TZ: ${TZ:-America/Caracas}
      PGTZ: ${TZ:-America/Caracas}
    ports:
      - '${DB_PORT}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend-app
    restart: unless-stopped
    environment:
      - FRONTEND_PORT=${FRONTEND_PORT}
      - VITE_PROXY_TARGET=http://node-app:3000
    expose:
      - '${FRONTEND_PORT}'
    depends_on:
      - node-app
    networks:
      - app-network

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx-gateway
    restart: unless-stopped
    depends_on:
      - node-app
      - frontend
    ports:
      - '${NGINX_PORT:-80}:80'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app-network

  db-backup:
    image: postgres:18-alpine
    container_name: postgres-backup
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - BACKUP_DIR=/backups
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-7}
      - BACKUP_INTERVAL_HOURS=${BACKUP_INTERVAL_HOURS:-24}
      - TZ=${TZ:-America/Caracas}
    volumes:
      - db-backups:/backups
      - ./scripts/backup/backup.sh:/backup/backup.sh:ro
    command: sh /backup/backup.sh
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
  uploads-data:
  db-backups:
